  <path d="M88 47 C87 42 85 40 82 42" fill="none" stroke="#e0b5a8" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M92 49 C92 44 90 42 87 44" fill="none" stroke="#e0b5a8" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Heart (on top of hands) -->
  <path d="M60 82 C60 82 33 63 33 48 C33 39 40 33 49 33 C54 33 58 36 60 40 C62 36 66 33 71 33 C80 33 87 39 87 48 C87 63 60 82 60 82Z"
        fill="#e8776f"/>
  <!-- Heart shine -->
