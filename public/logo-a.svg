  <path d="M36 48 C38 44 40 42 42 44 L44 56" fill="none" stroke="#d4a090" stroke-width="3" stroke-linecap="round"/>
  <path d="M32 47 C33 42 35 40 38 42" fill="none" stroke="#d4a090" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M28 49 C28 44 30 42 33 44" fill="none" stroke="#d4a090" stroke-width="2.5" stroke-linecap="round"/>

