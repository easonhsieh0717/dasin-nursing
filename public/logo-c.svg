<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Style C: 漸層守護 — 雙手從下方環抱愛心 -->
  <defs>
    <linearGradient id="heartGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f09090"/>
      <stop offset="100%" stop-color="#d4635b"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fdf8f6"/>
      <stop offset="100%" stop-color="#fce8e4"/>
    </linearGradient>
  </defs>
  <circle cx="60" cy="60" r="56" fill="url(#bgGrad)" stroke="#f0ddd8" stroke-width="1"/>

  <!-- Left hand - cupping from below -->
  <path d="M20 60 C22 52 30 46 38 46 C44 46 48 50 50 56 L52 66 C50 74 42 82 32 82 C24 82 18 76 18 68 Z"
        fill="#d4a090"/>
  <!-- Left fingers detail -->
  <path d="M34 46 C35 40 38 38 40 40 L42 48" fill="#d4a090" stroke="#c49088" stroke-width="0.5"/>
  <path d="M28 48 C28 42 31 40 34 42" fill="none" stroke="#c49088" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Right hand - cupping from below -->
  <path d="M100 60 C98 52 90 46 82 46 C76 46 72 50 70 56 L68 66 C70 74 78 82 88 82 C96 82 102 76 102 68 Z"
        fill="#e0b5a8"/>
  <!-- Right fingers detail -->
  <path d="M86 46 C85 40 82 38 80 40 L78 48" fill="#e0b5a8" stroke="#d4a59a" stroke-width="0.5"/>
  <path d="M92 48 C92 42 89 40 86 42" fill="none" stroke="#d4a59a" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Heart with gradient -->
  <path d="M60 78 C60 78 35 60 35 47 C35 39 41 34 49 34 C54 34 58 37 60 40 C62 37 66 34 71 34 C79 34 85 39 85 47 C85 60 60 78 60 78Z"
        fill="url(#heartGrad)"/>
  <!-- Heart shine -->
  <ellipse cx="50" cy="44" rx="5" ry="7" fill="white" opacity="0.25" transform="rotate(-12 50 44)"/>

  <!-- Sparkles -->
  <circle cx="28" cy="34" r="2" fill="#e8776f" opacity="0.35"/>
  <circle cx="92" cy="34" r="1.5" fill="#e8776f" opacity="0.3"/>
</svg>
